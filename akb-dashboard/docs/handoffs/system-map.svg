<text x="845" y="363" fill="#8b949e" font-size="13" text-anchor="middle" font-weight="600">REPEAT → next property · next market · loop the nation</text>
<text x="30" y="420" fill="#ffffff" font-size="16" font-weight="700">THE DATA (Airtable) — what each step reads &amp; writes</text>
<rect x="30" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="30" y="438" width="5" height="52" rx="2" fill="#2ea043"/>
<text x="44" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Listings_V1</text>
<text x="44" y="478" fill="#8b949e" font-size="10.5">live · shown everywhere</text>
<rect x="269" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="269" y="438" width="5" height="52" rx="2" fill="#2ea043"/>
<text x="283" y="460" fill="#ffffff" font-size="12.5" font-weight="700">ZIP_Registry</text>
<text x="283" y="478" fill="#8b949e" font-size="10.5">the markets we work</text>
<rect x="508" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="508" y="438" width="5" height="52" rx="2" fill="#da3633"/>
<text x="522" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Deal_Dossiers</text>
<text x="522" y="478" fill="#8b949e" font-size="10.5">the Deal File — WRITTEN, NOT SHOWN</text>
<rect x="747" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="747" y="438" width="5" height="52" rx="2" fill="#da3633"/>
<text x="761" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Operator_Action_Items</text>
<text x="761" y="478" fill="#8b949e" font-size="10.5">negotiations — WRITTEN, NOT SHOWN</text>
<rect x="986" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="986" y="438" width="5" height="52" rx="2" fill="#2ea043"/>
<text x="1000" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Agent_Proposals</text>
<text x="1000" y="478" fill="#8b949e" font-size="10.5">shown in the Queue</text>
<rect x="1225" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="1225" y="438" width="5" height="52" rx="2" fill="#2ea043"/>
<text x="1239" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Prospective_Buyers</text>
<text x="1239" y="478" fill="#8b949e" font-size="10.5">shown in Buyers</text>
<rect x="1464" y="438" width="234" height="52" rx="8" fill="#161b22" stroke="#30363d"/>
<rect x="1464" y="438" width="5" height="52" rx="2" fill="#d29922"/>
<text x="1478" y="460" fill="#ffffff" font-size="12.5" font-weight="700">Detroit_Spread_Targets</text>
<text x="1478" y="478" fill="#8b949e" font-size="10.5">deal-scan output</text>
<rect x="30" y="560" width="1660" height="250" rx="12" fill="#161b22" stroke="#30363d"/>
<text x="50" y="594" fill="#ffffff" font-size="18" font-weight="700">YOUR COCKPIT — the Dashboard (where your whole workflow should live)</text>
<text x="50" y="622" fill="#ffffff" font-size="13" font-weight="700">LIVE TODAY:</text>
<text x="146" y="622" fill="#c9d1d9" font-size="13">Command Center · Pipeline · Deal page · Queue · Buyers — all real Airtable data, no fakes. The skeleton works.</text>
<text x="50" y="645" fill="#ffffff" font-size="13" font-weight="700">THE DREAM:</text>
<text x="138" y="645" fill="#c9d1d9" font-size="13">One screen. Maverick lists what needs YOU, with the reason why / why-not. Every deal page carries ALL the data —</text>
<text x="50" y="668" fill="#ffffff" font-size="13" font-weight="700"></text>
<text x="50" y="668" fill="#8b949e" font-size="13">comps, rehab, CMA, and InvestorBase buyer ceiling — and an offer can't go out until that checklist is full.</text>
<text x="50" y="691" fill="#ffffff" font-size="13" font-weight="700"></text>
<text x="50" y="691" fill="#c9d1d9" font-size="13"></text>
<text x="50" y="714" fill="#ffffff" font-size="13.5" font-weight="700">3 WIRES TO CONNECT (this closes the gap between the spine and the glass):</text>
<text x="50" y="737" fill="#ffffff" font-size="13" font-weight="700">  1)</text>
<text x="90" y="737" fill="#c9d1d9" font-size="13">Show the Deal File (Deal_Dossiers) on each deal page — today it's written but nothing displays it.</text>
<text x="50" y="760" fill="#ffffff" font-size="13" font-weight="700">  2)</text>
<text x="90" y="760" fill="#c9d1d9" font-size="13">Show negotiations + action-items (Operator_Action_Items) in the Queue — today they're written but nothing displays them.</text>
<text x="50" y="783" fill="#ffffff" font-size="13" font-weight="700">  3)</text>
<text x="90" y="783" fill="#c9d1d9" font-size="13">Point the message history at the reliable text feed — today the deal page reads the old lossy one and can hide replies.</text>
<text x="30" y="845" fill="#8b949e" font-size="12">Honest status: steps 1–4 mostly run; step 5 is you-by-hand; steps 6–7 are partial/not-built. The data spine is ahead of the screens — the fix is wiring, not rebuilding.</text>
</svg>