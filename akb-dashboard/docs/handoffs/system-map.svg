<text x="30" y="44" fill="#ffffff" font-size="26" font-weight="700">AKB — The Machine, end to end</text>
<text x="30" y="74" fill="#8b949e" font-size="15">Find distressed → verify → price against the math → offer → negotiate → contract → sell to a buyer → REPEAT, market by market across the country.</text>
<rect x="1180" y="22" width="510" height="62" rx="8" fill="#161b22" stroke="#30363d"/>
<circle cx="1202" cy="40" r="7" fill="#2ea043"/>
<text x="1218" y="44" fill="#c9d1d9" font-size="13">runs by itself</text>
<circle cx="1202" cy="62" r="7" fill="#d29922"/>
<text x="1218" y="66" fill="#c9d1d9" font-size="13">runs but needs data / a nudge</text>
<circle cx="1202" cy="84" r="7" fill="#da3633"/>
<text x="1218" y="88" fill="#c9d1d9" font-size="13">manual or not built yet</text>
<rect x="30" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="30" y="110" width="6" height="214" rx="3" fill="#2ea043"/>
<circle cx="56" cy="138" r="13" fill="#13321f" stroke="#2ea043"/>
<text x="56" y="143" fill="#2ea043" font-size="14" font-weight="700" text-anchor="middle">1</text>
<text x="76" y="136" fill="#ffffff" font-size="17" font-weight="700">FIND</text>
<text x="76" y="154" fill="#8b949e" font-size="11">Sentinel  ·  intake</text>
<rect x="44" y="166" width="66" height="20" rx="10" fill="#13321f" stroke="#2ea043"/>
<text x="77" y="180" fill="#2ea043" font-size="10.5" font-weight="700" text-anchor="middle">AUTOMATED</text>
<text x="44" y="208" fill="#c9d1d9" font-size="11.5">Scans wholesale-friendly</text>
<text x="44" y="224" fill="#c9d1d9" font-size="11.5">ZIPs every day for</text>
<text x="44" y="240" fill="#c9d1d9" font-size="11.5">distressed listings.</text>
<text x="44" y="256" fill="#c9d1d9" font-size="11.5">Detroit just switched on</text>
<text x="44" y="272" fill="#c9d1d9" font-size="11.5">— 30 new ZIPs.</text>
<rect x="265" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="265" y="110" width="6" height="214" rx="3" fill="#d29922"/>
<circle cx="291" cy="138" r="13" fill="#33290f" stroke="#d29922"/>
<text x="291" y="143" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">2</text>
<text x="311" y="136" fill="#ffffff" font-size="17" font-weight="700">VERIFY</text>
<text x="311" y="154" fill="#8b949e" font-size="11">Sentry + Appraiser</text>
<rect x="279" y="166" width="53" height="20" rx="10" fill="#33290f" stroke="#d29922"/>
<text x="305" y="180" fill="#d29922" font-size="10.5" font-weight="700" text-anchor="middle">PARTIAL</text>
<text x="279" y="208" fill="#c9d1d9" font-size="11.5">Confirms still-for-sale</text>
<text x="279" y="224" fill="#c9d1d9" font-size="11.5">and reads photos for</text>
<text x="279" y="240" fill="#c9d1d9" font-size="11.5">distress + rehab scope.</text>
<text x="279" y="256" fill="#c9d1d9" font-size="11.5">Catches most, misses</text>
<text x="279" y="272" fill="#c9d1d9" font-size="11.5">some edge cases.</text>
<rect x="500" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="500" y="110" width="6" height="214" rx="3" fill="#d29922"/>
<circle cx="526" cy="138" r="13" fill="#33290f" stroke="#d29922"/>
<text x="526" y="143" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">3</text>
<text x="546" y="136" fill="#ffffff" font-size="17" font-weight="700">PRICE</text>
<text x="546" y="154" fill="#8b949e" font-size="11">Appraiser</text>
<rect x="514" y="166" width="130" height="20" rx="10" fill="#33290f" stroke="#d29922"/>
<text x="579" y="180" fill="#d29922" font-size="10.5" font-weight="700" text-anchor="middle">MATH OK · DATA THIN</text>
<text x="514" y="208" fill="#c9d1d9" font-size="11.5">ARV from real comps,</text>
<text x="514" y="224" fill="#c9d1d9" font-size="11.5">rehab from photos,</text>
<text x="514" y="240" fill="#c9d1d9" font-size="11.5">worst-case max offer.</text>
<text x="514" y="256" fill="#c9d1d9" font-size="11.5">Needs CMA + buyer</text>
<text x="514" y="272" fill="#c9d1d9" font-size="11.5">ceiling to be complete.</text>
<rect x="735" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="735" y="110" width="6" height="214" rx="3" fill="#d29922"/>
<circle cx="761" cy="138" r="13" fill="#33290f" stroke="#d29922"/>
<text x="761" y="143" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">4</text>
<text x="781" y="136" fill="#ffffff" font-size="17" font-weight="700">OFFER</text>
<text x="781" y="154" fill="#8b949e" font-size="11">Crier  ·  texts agent</text>
<rect x="749" y="166" width="53" height="20" rx="10" fill="#33290f" stroke="#d29922"/>
<text x="775" y="180" fill="#d29922" font-size="10.5" font-weight="700" text-anchor="middle">PARTIAL</text>
<text x="749" y="208" fill="#c9d1d9" font-size="11.5">Texts a cash offer to the</text>
<text x="749" y="224" fill="#c9d1d9" font-size="11.5">listing agent via Quo.</text>
<text x="749" y="240" fill="#c9d1d9" font-size="11.5">Should NOT fire until the</text>
<text x="749" y="256" fill="#c9d1d9" font-size="11.5">data checklist is full.</text>
<rect x="970" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="970" y="110" width="6" height="214" rx="3" fill="#da3633"/>
