<text x="1016" y="136" fill="#ffffff" font-size="17" font-weight="700">NEGOTIATE</text>
<text x="1016" y="154" fill="#8b949e" font-size="11">You + the math</text>
<rect x="984" y="166" width="46" height="20" rx="10" fill="#331717" stroke="#da3633"/>
<text x="1007" y="180" fill="#da3633" font-size="10.5" font-weight="700" text-anchor="middle">MANUAL</text>
<text x="984" y="208" fill="#c9d1d9" font-size="11.5">Counters are captured to</text>
<text x="984" y="224" fill="#c9d1d9" font-size="11.5">a list, but no screen</text>
<text x="984" y="240" fill="#c9d1d9" font-size="11.5">shows them yet.</text>
<text x="984" y="256" fill="#c9d1d9" font-size="11.5">You decide against the</text>
<text x="984" y="272" fill="#c9d1d9" font-size="11.5">math by hand.</text>
<rect x="1205" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="1205" y="110" width="6" height="214" rx="3" fill="#da3633"/>
<circle cx="1231" cy="138" r="13" fill="#331717" stroke="#da3633"/>
<text x="1231" y="143" fill="#da3633" font-size="14" font-weight="700" text-anchor="middle">6</text>
<text x="1251" y="136" fill="#ffffff" font-size="17" font-weight="700">CONTRACT</text>
<text x="1251" y="154" fill="#8b949e" font-size="11">Scribe + DocuSign</text>
<rect x="1219" y="166" width="66" height="20" rx="10" fill="#331717" stroke="#da3633"/>
<text x="1252" y="180" fill="#da3633" font-size="10.5" font-weight="700" text-anchor="middle">NOT BUILT</text>
<text x="1219" y="208" fill="#c9d1d9" font-size="11.5">Groundwork only.</text>
<text x="1219" y="224" fill="#c9d1d9" font-size="11.5">Envelope creation and</text>
<text x="1219" y="240" fill="#c9d1d9" font-size="11.5">e-signing are not</text>
<text x="1219" y="256" fill="#c9d1d9" font-size="11.5">wired up yet.</text>
<rect x="1440" y="110" width="220" height="214" rx="10" fill="#161b22" stroke="#30363d"/>
<rect x="1440" y="110" width="6" height="214" rx="3" fill="#d29922"/>
<circle cx="1466" cy="138" r="13" fill="#33290f" stroke="#d29922"/>
<text x="1466" y="143" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">7</text>
<text x="1486" y="136" fill="#ffffff" font-size="17" font-weight="700">DISPO</text>
<text x="1486" y="154" fill="#8b949e" font-size="11">Scout + Forge</text>
<rect x="1454" y="166" width="53" height="20" rx="10" fill="#33290f" stroke="#d29922"/>
<text x="1480" y="180" fill="#d29922" font-size="10.5" font-weight="700" text-anchor="middle">PARTIAL</text>
<text x="1454" y="208" fill="#c9d1d9" font-size="11.5">Buyer list + warm-up</text>
<text x="1454" y="224" fill="#c9d1d9" font-size="11.5">drafts exist.</text>
<text x="1454" y="240" fill="#c9d1d9" font-size="11.5">Matching a deal to a</text>
<text x="1454" y="256" fill="#c9d1d9" font-size="11.5">buyer and blasting it</text>
<text x="1454" y="272" fill="#c9d1d9" font-size="11.5">is not automated.</text>
