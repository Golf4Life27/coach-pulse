# Frontier rotation — on-demand prime for the expansion pipeline.
#
# Fires /api/cron/frontier-rotation, the same pass the Mon/Thu vercel.json
# crons run: stage new expansion-metro ZIPs (tier=staged, config order,
# chew-and-move-on) + promote staged->launch within the RentCast budget
# capacity the governor computes. Zero paid API calls; the belt crawls the
# promoted ZIPs on its own cadence afterward.
#
# mode=apply actually stages + promotes; default dry previews the exact
# staging + promotion decisions with ZERO writes. After a manual prime the
# scheduled crons carry it autonomously — this is just to not wait for the
# next Mon/Thu slot.
#
# Required GitHub secret: CRON_SECRET (mirror of the Vercel env).

name: Frontier rotation (prime expansion)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "apply = stage + promote for real. Default dry = preview decisions, zero writes."
        required: false
        default: "dry"
        type: choice
        options: ["dry", "apply"]
      base_url:
        description: "Production base URL (override only for staging tests)."
        required: false
        default: "https://coach-pulse-ten.vercel.app"
        type: string

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MODE: ${{ inputs.mode }}
      BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Refuse to run when CRON_SECRET is missing
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not configured as a GitHub Actions secret."
            exit 1
          fi
          echo "CRON_SECRET present; proceeding."

      - name: Invoke /api/cron/frontier-rotation
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          Q=""
          if [ "${MODE}" = "apply" ]; then Q="?apply=1"; fi
          URL="${BASE_URL}/api/cron/frontier-rotation${Q}"
          echo "GET ${URL}  (mode=${MODE})"
          HTTP_CODE=$(curl -sS -o /tmp/frontier.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-vercel-cron: 1" \
            "${URL}")
          echo "HTTP ${HTTP_CODE}"
          echo "--- response body ---"
          jq . /tmp/frontier.json 2>/dev/null || cat /tmp/frontier.json
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::frontier-rotation returned HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Surface the headline numbers
        if: success()
        run: |
          set -euo pipefail
          {
            echo "## Frontier rotation (${MODE})"
            echo ""
            jq -r '
              "- registry total: \(.health.registry_total // "?")",
              "- eligible now: \(.health.eligible_now // "?")",
              "- capacity left: \(.health.capacity_left // "?")",
              "- current daily cost: \(.health.current_daily_cost // "?")",
              "- paused excluded: \(.health.paused_excluded // "?")",
              "- promoted: \(.promoted | map(select(.error==null)) | length)",
              "- staged created: \(.staging.created // 0)",
              "- metros opened: \(.staging.metros_opened // [] | join(", "))",
              "- staged backlog before: \(.staging.staged_backlog_before // "?")",
              "- queue exhausted: \(.staging.queue_exhausted // "?")"
            ' /tmp/frontier.json 2>/dev/null || echo "- (see raw response above)"
          } >> "$GITHUB_STEP_SUMMARY"
