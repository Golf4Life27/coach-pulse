# Pipeline_State backfill — server-side sweep trigger.
#
# Manual (workflow_dispatch) trigger that invokes
# /api/cron/pipeline-state-backfill-sweep on the prod alias using the
# CRON_SECRET stored as a GitHub Actions repository secret. Built so the
# operator never has to paste a session cookie into a browser console
# again — and so Code can self-drive the sweep without ever holding the
# CRON_SECRET in chat.
#
# Standing rule (SYSTEM_FACTS.md): operational / execution / diagnostic
# work belongs to Code, not Alex.
#
# Required GitHub secret: CRON_SECRET (mirror of the same Vercel env).
# If absent, the workflow fails fast with a readable message so the
# operator can add it once via Settings → Secrets and variables →
# Actions → New repository secret.

name: Pipeline_State backfill sweep

on:
  workflow_dispatch:
    inputs:
      max_records:
        description: "Records to sweep this invocation (default 500, hard max 1000)."
        required: false
        default: "500"
        type: string
      concurrency:
        description: "Concurrent in-flight engine calls (default 4, hard max 10)."
        required: false
        default: "4"
        type: string
      base_url:
        description: "Production base URL (override only for staging tests)."
        required: false
        default: "https://coach-pulse-ten.vercel.app"
        type: string

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MAX_RECORDS: ${{ inputs.max_records }}
      CONCURRENCY: ${{ inputs.concurrency }}
      BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Refuse to run when CRON_SECRET is missing
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not configured as a GitHub Actions secret."
            echo "Add it at Settings → Secrets and variables → Actions → New repository secret."
            echo "Use the same value as the CRON_SECRET env var in Vercel for this project."
            exit 1
          fi
          echo "CRON_SECRET present; proceeding."

      - name: Invoke /api/cron/pipeline-state-backfill-sweep
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="${BASE_URL}/api/cron/pipeline-state-backfill-sweep?max_records=${MAX_RECORDS}&concurrency=${CONCURRENCY}"
          echo "POST ${URL}"
          # Capture body + http code separately so we can surface both even on 4xx/5xx.
          HTTP_CODE=$(curl -sS -o /tmp/sweep.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-vercel-cron: 1" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${URL}")
          echo "HTTP ${HTTP_CODE}"
          echo "--- response body ---"
          # Pretty-print JSON when jq is available (it is on ubuntu-latest).
          jq . /tmp/sweep.json 2>/dev/null || cat /tmp/sweep.json
          # Fail the step on non-2xx so the workflow is red when the sweep fails.
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::Sweep returned HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Surface the headline numbers
        if: success()
        run: |
          set -euo pipefail
          REMAINING=$(jq -r '.remaining_eligible_estimate // "?"' /tmp/sweep.json)
          PROCESSED=$(jq -r '.summary.processed // "?"' /tmp/sweep.json)
          ERRORS=$(jq -r '.summary.errors_count // "?"' /tmp/sweep.json)
          BLACKLIST=$(jq -r '.summary.blacklist_overrides_applied // "?"' /tmp/sweep.json)
          echo "## Pipeline_State sweep summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- processed: ${PROCESSED}" >> "$GITHUB_STEP_SUMMARY"
          echo "- errors: ${ERRORS}" >> "$GITHUB_STEP_SUMMARY"
          echo "- blacklist_overrides_applied: ${BLACKLIST}" >> "$GITHUB_STEP_SUMMARY"
          echo "- remaining_eligible_estimate: ${REMAINING}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${REMAINING}" = "0" ]; then
            echo "**Backfill complete.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Re-run the workflow to continue — runs are idempotent." >> "$GITHUB_STEP_SUMMARY"
          fi
