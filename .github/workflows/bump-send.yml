# H2 bump lane — controlled, on-demand dispatch (#33, 2026-07-11).
#
# Fires the day-3/day-7 bump batch ON DEMAND (catch-up dispatch doctrine:
# after any supply-unlocking pass, dispatch immediately rather than waiting
# for the next cron slot). Uses ?force_run=1 — bypasses ONLY the global
# MAVERICK_CRON_ENABLED gate, exactly like h2-send.yml.
#
# DRY by default — previews the due queue + exact bump bodies, ZERO sends.
# mode=live sends, but ONLY if the Vercel send flags are set
# (H2_OUTREACH_HARD_DISABLE=false, H2_OUTREACH_LIVE=true,
# STOP_OPT_OUT_LIVE=true, H2_COVERED_ZIPS). Without those, live mode still
# no-ops (forced dry). Send-cap fail-closed: empty coverage => 0 sends.
#
# Required GitHub secret: CRON_SECRET (mirror of the Vercel env).

name: H2 bump send (controlled)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "live = send (needs the Vercel send flags set). Default dry = preview due bumps, zero sends."
        required: false
        default: "dry"
        type: choice
        options: ["dry", "live"]
      limit:
        description: "Max records to consider this run (send-cap still clamps per run/zip)."
        required: false
        default: "10"
        type: string
      base_url:
        description: "Production base URL (override only for staging tests)."
        required: false
        default: "https://coach-pulse-ten.vercel.app"
        type: string

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MODE: ${{ inputs.mode }}
      LIMIT: ${{ inputs.limit }}
      BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Refuse to run when CRON_SECRET is missing
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not configured as a GitHub Actions secret."
            exit 1
          fi
          echo "CRON_SECRET present; proceeding."

      - name: Invoke /api/cron/bump-followup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          Q="force_run=1&limit=${LIMIT}"
          if [ "${MODE}" = "live" ]; then Q="${Q}&dry_run=false"; fi
          URL="${BASE_URL}/api/cron/bump-followup?${Q}"
          echo "GET ${URL}  (mode=${MODE})"
          HTTP_CODE=$(curl -sS -o /tmp/bump.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-vercel-cron: 1" \
            "${URL}")
          echo "HTTP ${HTTP_CODE}"
          echo "--- response body ---"
          jq . /tmp/bump.json 2>/dev/null || cat /tmp/bump.json
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::bump-followup returned HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Surface the headline numbers
        if: success()
        run: |
          set -euo pipefail
          {
            echo "## H2 bump lane (${MODE})"
            echo ""
            jq -r '
              "- mode: \(.mode // "?")",
              "- due_total: \(.due_total // "?")",
              "- planned: \(.planned // "?")",
              "- bumped: \(.summary.bumped // "?")",
              "- send_cap: \(.send_cap.config // "n/a")"
            ' /tmp/bump.json 2>/dev/null || echo "- (see raw response above)"
          } >> "$GITHUB_STEP_SUMMARY"
