# Evict poison H2 dispatch claims — controlled, on-demand trigger.
#
# Calls POST /api/admin/clear-dispatch-claim to delete stuck `h2:dispatch:{id}`
# KV claims (a pre-dispatch gate block acquires the claim then `continue`s
# without releasing it, poisoning the record for the 24h TTL).
#
# DRY by default — reads each claim's ISO stamp, deletes NOTHING. mode=apply
# evicts. Clearing a claim never sends: it only lets a future gated run
# re-attempt. Only ever touches keys under the fixed `h2:dispatch:` prefix.
#
# Required GitHub secret: CRON_SECRET (mirror of the Vercel env).

name: Clear H2 dispatch claim (controlled)

on:
  workflow_dispatch:
    inputs:
      record_ids:
        description: "Space- or comma-separated Airtable record IDs (rec + 14 chars) whose dispatch claim to evict."
        required: true
        type: string
      mode:
        description: "apply = evict the claims. Default dry = read-only preview (shows each claim's ISO stamp)."
        required: false
        default: "dry"
        type: choice
        options: ["dry", "apply"]
      base_url:
        description: "Production base URL (override only for staging tests)."
        required: false
        default: "https://coach-pulse-ten.vercel.app"
        type: string

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RECORD_IDS: ${{ inputs.record_ids }}
      MODE: ${{ inputs.mode }}
      BASE_URL: ${{ inputs.base_url }}
    steps:
      - name: Refuse to run when CRON_SECRET is missing
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET is not configured as a GitHub Actions secret."
            exit 1
          fi
          echo "CRON_SECRET present; proceeding."

      - name: POST /api/admin/clear-dispatch-claim
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          # Split the input on commas/spaces, keep only well-formed record IDs,
          # and build a JSON array. apply=true only when mode=apply.
          IDS_JSON=$(printf '%s' "${RECORD_IDS}" | tr ',' ' ' | tr -s ' ' '\n' \
            | grep -E '^rec[A-Za-z0-9]{14}$' | jq -R . | jq -s .)
          COUNT=$(printf '%s' "${IDS_JSON}" | jq 'length')
          if [ "${COUNT}" -eq 0 ]; then
            echo "::error::no valid record IDs (expected rec + 14 chars)"
            exit 1
          fi
          APPLY=false
          if [ "${MODE}" = "apply" ]; then APPLY=true; fi
          BODY=$(jq -nc --argjson ids "${IDS_JSON}" --argjson apply "${APPLY}" \
            '{recordIds:$ids, apply:$apply}')
          echo "POST ${BASE_URL}/api/admin/clear-dispatch-claim  (mode=${MODE}, ids=${COUNT})"
          echo "body=${BODY}"
          HTTP_CODE=$(curl -sS -o /tmp/ccl.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-vercel-cron: 1" \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            "${BASE_URL}/api/admin/clear-dispatch-claim")
          echo "HTTP ${HTTP_CODE}"
          echo "--- response body ---"
          jq . /tmp/ccl.json 2>/dev/null || cat /tmp/ccl.json
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::clear-dispatch-claim returned HTTP ${HTTP_CODE}"
            exit 1
          fi
